name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *" # runs daily at midnight UTC
  workflow_dispatch:     # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: stinoooo
          file: assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and move trophy SVG
        run: |
          echo "=== Searching for trophy.svg ==="
          find / -name "trophy.svg" 2>/dev/null || echo "Not found anywhere"
          echo "=== Current directory ==="
          pwd
          echo "=== Repo contents ==="
          ls -la
          echo "=== Assets folder ==="
          ls -la assets/ 2>/dev/null || echo "No assets folder"

      - name: Commit trophy SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f assets/trophy.svg
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "chore: regenerate trophy SVG [skip ci]" &&
            git push
          )
