name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: stinoooo
          outputs: |
            dist/snake.svg?color_snake=#1f2937&color_dots=#ebedf0,#b3e6f5,#66ccee,#33b5e0,#0099cc
            dist/snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#161b22,#0a3d52,#0277a8,#00b4d8,#00d4ff

      - name: Finalize SVG (full raster + date labels)
        run: python3 .github/scripts/add_labels.py

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
