name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout repo (needed for the labels script)
        uses: actions/checkout@v4

      # Fetch the user's total contributions in the last year via the
      # GitHub GraphQL API. Surfaced as a step output so the labels
      # script can render it as a header inside the SVG.
      - name: fetch total contribution count
        id: contribs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USER="${{ github.repository_owner }}"
          COUNT=$(gh api graphql \
            -f query="query { user(login: \"$USER\") { contributionsCollection { contributionCalendar { totalContributions } } } }" \
            --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Total contributions: $COUNT"

      # Cyan/blue palette layered on github-dark so empty cells render at
      # #161b22 (visible against page bg, never invisible).
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#1f2937&color_dots=#ebedf0,#b3e6f5,#66ccee,#33b5e0,#0099cc
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#161b22,#0a3d52,#0277a8,#00b4d8,#00d4ff

      # Decorate the SVGs with month/day axis labels and the contribution
      # count header. Labels are placed in expanded viewBox space, outside
      # the snake's animation range, so they never overlap the animation.
      - name: add labels and contribution count
        env:
          CONTRIB_COUNT: ${{ steps.contribs.outputs.count }}
        run: python3 .github/scripts/labels.py

      - name: push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
